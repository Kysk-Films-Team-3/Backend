spring:
  application:
    name: kyskfilms-backend

  datasource:
    url: jdbc:postgresql://localhost:5432/kyskfilms_db
    username: kysk_user
    password: ${DB_PASSWORD:your_secure_password}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${KEYCLOAK_ISSUER_URI:http://localhost:8080/realms/kyskfilms}
          jwk-set-uri: ${KEYCLOAK_JWK_SET_URI:http://localhost:8080/realms/kyskfilms/protocol/openid-connect/certs}

server:
  port: 8081

jwt:
  secret: ${JWT_SECRET:YourVeryLongAndSecureSecretKeyThatShouldBeAtLeast256BitsLong}
  expiration: 86400000 # 24 hours

keycloak:
  realm: kyskfilms
  auth-server-url: ${KEYCLOAK_SERVER_URL:http://localhost:8080}
  ssl-required: external
  resource: kyskfilms-backend
  verify-token-audience: true

logging:
  level:
    com.kyskfilms: DEBUG
    org.springframework.security: DEBUG